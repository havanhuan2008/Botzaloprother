databases:
  - name: zalo-bot-db
    databaseName: zalo_bot
    user: zalo_bot
    plan: free

services:
  - type: web
    name: zalo-auto-reply-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zalo-bot-db
          property: connectionString
      - key: ZALO_ACCESS_TOKEN
        sync: false
      - key: ZALO_APP_ID
        sync: false
      - key: ZALO_OA_SECRET_KEY
        sync: false
      - key: ZALO_VALIDATE_SIGNATURE
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
