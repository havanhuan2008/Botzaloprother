{% extends 'base.html' %}
{% block title %}Đăng nhập admin{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card card-soft">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3 fw-bold mb-4">Đăng nhập quản trị</h1>
        <form method="post" class="vstack gap-3">
          <div>
            <label class="form-label">Tên đăng nhập</label>
            <input class="form-control form-control-lg" name="username" required>
          </div>
          <div>
            <label class="form-label">Mật khẩu</label>
            <input type="password" class="form-control form-control-lg" name="password" required>
          </div>
          <button class="btn btn-primary btn-lg" type="submit">Đăng nhập</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
